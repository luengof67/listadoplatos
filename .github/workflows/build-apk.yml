name: Construir APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Inyectar clave de Gemini
        run: sed -i 's|__CLAVE_GEMINI__|${{ secrets.GEMINI_API_KEY }}|' www/index.html

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependencias
        run: npm install

      - name: Usar firma fija
